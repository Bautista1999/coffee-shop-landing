<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" preserveAspectRatio="xMidYMid slice">
  <!-- Main Gradient Background -->
  <defs>
    <linearGradient id="heroGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6F4E37;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8B6F47;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A0826D;stop-opacity:1" />
    </linearGradient>
    
    <pattern id="coffeeBeans" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <ellipse cx="30" cy="30" rx="8" ry="12" fill="#4A3728" opacity="0.15" transform="rotate(-30 30 30)"/>
      <ellipse cx="70" cy="60" rx="8" ry="12" fill="#4A3728" opacity="0.1" transform="rotate(45 70 60)"/>
      <ellipse cx="50" cy="80" rx="8" ry="12" fill="#4A3728" opacity="0.12" transform="rotate(15 50 80)"/>
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="600" fill="url(#heroGradient)"/>
  
  <!-- Coffee Beans Pattern Overlay -->
  <rect width="1200" height="600" fill="url(#coffeeBeans)"/>
  
  <!-- Decorative Coffee Cup Elements -->
  <g opacity="0.08">
    <!-- Large Cup - Top Left -->
    <circle cx="150" cy="100" r="80" fill="none" stroke="#F5E6D3" stroke-width="3"/>
    <ellipse cx="150" cy="100" rx="70" ry="50" fill="none" stroke="#F5E6D3" stroke-width="2"/>
    
    <!-- Medium Cup - Bottom Right -->
    <circle cx="1050" cy="480" r="60" fill="none" stroke="#F5E6D3" stroke-width="2"/>
    <ellipse cx="1050" cy="480" rx="50" ry="35" fill="none" stroke="#F5E6D3" stroke-width="1.5"/>
    
    <!-- Small Cup - Center -->
    <circle cx="600" cy="500" r="45" fill="none" stroke="#F5E6D3" stroke-width="2"/>
    <ellipse cx="600" cy="500" rx="35" ry="25" fill="none" stroke="#F5E6D3" stroke-width="1"/>
  </g>
  
  <!-- Subtle Geometric Accents -->
  <g fill="none" stroke="#D4A574" stroke-width="1" opacity="0.1">
    <line x1="0" y1="0" x2="1200" y2="600"/>
    <line x1="1200" y1="0" x2="0" y2="600"/>
    <circle cx="600" cy="300" r="200"/>
    <circle cx="600" cy="300" r="400"/>
  </g>
  
  <!-- Subtle Light Rays -->
  <g opacity="0.05" fill="none" stroke="#F5E6D3" stroke-width="2">
    <line x1="600" y1="0" x2="500" y2="600"/>
    <line x1="600" y1="0" x2="700" y2="600"/>
    <line x1="600" y1="0" x2="400" y2="600"/>
    <line x1="600" y1="0" x2="800" y2="600"/>
  </g>
</svg>
