<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Background -->
  <rect width="300" height="300" fill="#F5E6D3" rx="12"/>
  
  <!-- Decorative Corner Elements -->
  <circle cx="20" cy="20" r="3" fill="#D4A574" opacity="0.3"/>
  <circle cx="280" cy="20" r="3" fill="#D4A574" opacity="0.3"/>
  <circle cx="20" cy="280" r="3" fill="#D4A574" opacity="0.3"/>
  <circle cx="280" cy="280" r="3" fill="#D4A574" opacity="0.3"/>
  
  <defs>
    <linearGradient id="americanoGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4A3728;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2C1810;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Classic Americano Cup -->
  <g>
    <!-- Cup Body -->
    <path d="M 88 75 L 95 205 Q 95 218 108 218 L 192 218 Q 205 218 205 205 L 212 75 Z" 
          fill="#F5E6D3" stroke="#6F4E37" stroke-width="2"/>
    
    <!-- Cup Handle -->
    <path d="M 212 95 Q 240 95 240 150 Q 240 205 212 205" 
          fill="none" stroke="#6F4E37" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Hot water with espresso -->
    <ellipse cx="150" cy="215" rx="55" ry="7" fill="url(#americanoGradient)"/>
    <path d="M 98 80 L 102 210 Q 102 215 112 215 L 188 215 Q 198 215 202 210 L 210 80 Z" 
          fill="url(#americanoGradient)"/>
    
    <!-- Subtle Crema Layer -->
    <ellipse cx="150" cy="75" rx="57" ry="9" fill="#6F4E37" opacity="0.4"/>
    
    <!-- Saucer -->
    <ellipse cx="150" cy="220" rx="72" ry="12" fill="#E8DCC8" stroke="#6F4E37" stroke-width="1.5"/>
  </g>
  
  <!-- Steam Wisps -->
  <g stroke="#D4A574" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5">
    <path d="M 120 65 Q 118 45 125 25"/>
    <path d="M 150 60 Q 148 35 157 15"/>
    <path d="M 180 65 Q 182 45 175 25"/>
  </g>
  
  <!-- Text Label -->
  <text x="150" y="265" font-family="Georgia, serif" font-size="20" font-weight="bold" 
        text-anchor="middle" fill="#6F4E37">AMERICANO</text>
  
  <!-- Decorative Elements -->
  <circle cx="50" cy="50" r="25" fill="none" stroke="#D4A574" stroke-width="1" opacity="0.2"/>
  <circle cx="250" cy="250" r="30" fill="none" stroke="#D4A574" stroke-width="1" opacity="0.2"/>
</svg>
