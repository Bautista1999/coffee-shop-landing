<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Background -->
  <rect width="300" height="300" fill="#F5E6D3" rx="12"/>
  
  <!-- Decorative Corner Elements -->
  <circle cx="20" cy="20" r="3" fill="#D4A574" opacity="0.3"/>
  <circle cx="280" cy="20" r="3" fill="#D4A574" opacity="0.3"/>
  <circle cx="20" cy="280" r="3" fill="#D4A574" opacity="0.3"/>
  <circle cx="280" cy="280" r="3" fill="#D4A574" opacity="0.3"/>
  
  <defs>
    <linearGradient id="cappuccinoGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8B6F47;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6F4E37;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Tall Coffee Cup -->
  <g>
    <!-- Cup Body -->
    <path d="M 85 70 L 92 200 Q 92 215 105 215 L 195 215 Q 208 215 208 200 L 215 70 Z" 
          fill="#F5E6D3" stroke="#6F4E37" stroke-width="2"/>
    
    <!-- Cup Handle -->
    <path d="M 215 90 Q 245 90 245 145 Q 245 200 215 200" 
          fill="none" stroke="#6F4E37" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Coffee inside -->
    <ellipse cx="150" cy="210" rx="58" ry="8" fill="url(#cappuccinoGradient)"/>
    <path d="M 95 75 L 100 205 Q 100 212 110 212 L 190 212 Q 200 212 205 205 L 212 75 Z" 
          fill="url(#cappuccinoGradient)"/>
    
    <!-- Steamed Milk Layer -->
    <ellipse cx="150" cy="95" rx="58" ry="18" fill="#D4A574" opacity="0.7"/>
    <ellipse cx="150" cy="88" rx="58" ry="15" fill="#E8DCC8" opacity="0.5"/>
    
    <!-- Foam Decorations -->
    <circle cx="125" cy="75" r="6" fill="#F5E6D3" opacity="0.9"/>
    <circle cx="150" cy="70" r="5" fill="#F5E6D3" opacity="0.9"/>
    <circle cx="175" cy="76" r="6" fill="#F5E6D3" opacity="0.9"/>
    <circle cx="140" cy="82" r="4" fill="#F5E6D3" opacity="0.7"/>
    <circle cx="160" cy="83" r="4" fill="#F5E6D3" opacity="0.7"/>
    
    <!-- Saucer -->
    <ellipse cx="150" cy="220" rx="75" ry="13" fill="#E8DCC8" stroke="#6F4E37" stroke-width="1.5"/>
  </g>
  
  <!-- Text Label -->
  <text x="150" y="260" font-family="Georgia, serif" font-size="20" font-weight="bold" 
        text-anchor="middle" fill="#6F4E37">CAPPUCCINO</text>
  
  <!-- Decorative Elements -->
  <circle cx="50" cy="50" r="25" fill="none" stroke="#D4A574" stroke-width="1" opacity="0.2"/>
  <circle cx="250" cy="250" r="30" fill="none" stroke="#D4A574" stroke-width="1" opacity="0.2"/>
</svg>
